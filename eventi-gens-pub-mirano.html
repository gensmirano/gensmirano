<!-- EVENTS SCRIPT -->
<script>
const EVENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5_wEexCQxnpoWje0YrtRDB8C33glfApo-zPmAdBZGaiD_Arlkt8advDNzas5nB-gNbzws20K18iVk/pub?output=csv";

async function loadEvents() {
  try {
    const res = await fetch(EVENTS_URL);
    const data = await res.text();

    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("eventsContainer");

    if (!container) return;
    container.innerHTML = "";

    rows.forEach(row => {
      const cols = parseCSVRow(row);

      const titolo = cols[0];
      const descrizione = cols[1];
      const data = cols[2];
      const orario = cols[3];
      const attivo = cols[4];

      if (!titolo) return;
      if (!attivo || attivo.toUpperCase() !== "SI") return;

      const card = document.createElement("div");
      card.className = "event-card";

      card.innerHTML = `
        <h3>${titolo}</h3>
        <p>${descrizione}</p>
        <span>${data} • ${orario}</span>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    console.error("Errore caricamento eventi:", err);
  }
}

/* CSV parser robusto */
function parseCSVRow(text) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];

    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);

  return result.map(v => v.replace(/^"|"$/g, "").trim());
}

loadEvents();
setInterval(loadEvents, 30000);
</script>
