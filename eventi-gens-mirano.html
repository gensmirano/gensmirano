<main class="eventi-container">

    <!-- Eventi caricati da Google Sheet -->

<script>
// ==========================
// CONFIG GOOGLE SHEET
// ==========================
const sheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHWnFzmuBy1tUV_FAW47Mwv-VquLC1-EBRlaextrMZ5ArgfvVH_YkzIdL0TOBf04Rl89Mu51Xuh74y/pub?output=csv";

// ==========================
// FETCH EVENTI
// ==========================
async function loadEventi() {
  try {
    const res = await fetch(sheetCSV);
    const text = await res.text();

    const events = parseCSV(text);

    const container = document.getElementById('eventi-list');
    events.forEach(ev => {
      const div = document.createElement('div');
      div.className = 'evento-item';
      div.innerHTML = `
        <img src="${ev.Foto}" alt="${ev.Titolo}" class="evento-img">
        <div class="evento-content">
          <span class="evento-date">${ev.Data}</span> 
          <span class="evento-time">${ev.Orario}</span>
          <h3 class="evento-title">${ev.Titolo}</h3>
          <p class="evento-desc">${ev.Descrizione}</p>
        </div>
      `;
      container.appendChild(div);
    });

  } catch(err) {
    console.error("Errore caricamento eventi:", err);
  }
}

// ==========================
// PARSER CSV ROBUSTO
// ==========================
function parseCSV(str) {
  const rows = [];
  const lines = str.trim().split('\n');
  const headers = lines[0].split(',');

  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;

    const cells = [];
    let current = '';
    let inQuotes = false;

    for(let j=0;j<lines[i].length;j++){
      const char = lines[i][j];
      if(char === '"') { inQuotes = !inQuotes; continue; }
      if(char === ',' && !inQuotes) { cells.push(current); current=''; continue; }
      current += char;
    }
    cells.push(current);

    const obj = {};
    headers.forEach((h, idx) => obj[h.trim()] = (cells[idx] || '').trim());
    rows.push(obj);
  }

  return rows;
}

loadEventi();
</script>

<script src="gens.js"></script>
